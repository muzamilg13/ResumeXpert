name: Deploy to ECS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to ECR
        run: |
          aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | \
          docker login --username AWS --password-stdin \
          ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com

      # -----------------------
      # BACKEND BUILD & PUSH
      # -----------------------
      - name: Build, tag, and push backend image
        run: |
          IMAGE_TAG=${{ github.sha }}
          ECR_URI=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/${{ secrets.ECR_BACKEND_REPO }}

          docker build -t $ECR_URI:$IMAGE_TAG ./backend
          docker push $ECR_URI:$IMAGE_TAG

      # -----------------------
      # FRONTEND BUILD & PUSH
      # -----------------------
      - name: Build, tag, and push frontend image
        run: |
          IMAGE_TAG=${{ github.sha }}
          ECR_URI=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/${{ secrets.ECR_FRONTEND_REPO }}

          docker build -t $ECR_URI:$IMAGE_TAG ./frontend
          docker push $ECR_URI:$IMAGE_TAG

      # -----------------------
      # FORCE ECS REDEPLOY
      # -----------------------
      - name: Force ECS deployment
        run: |
          aws ecs update-service \
            --cluster resumexpert-cluster \
            --service resumexpert-backend-service \
            --force-new-deployment

          aws ecs update-service \
            --cluster resumexpert-cluster \
            --service resumexpert-frontend-service \
            --force-new-deployment

name: Deploy to ECS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to ECR
        run: |
          aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | \
          docker login --username AWS --password-stdin \
          ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com

      - name: Set image tag
        run: echo "IMAGE_TAG=${GITHUB_SHA}" >> $GITHUB_ENV

      # ---------------- BACKEND ----------------
      - name: Build and push backend
        run: |
          ECR_URI=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/${{ secrets.ECR_BACKEND_REPO }}
          docker build -t $ECR_URI:$IMAGE_TAG ./backend
          docker push $ECR_URI:$IMAGE_TAG

      - name: Update backend task definition
        run: |
          TASK_DEF=$(aws ecs describe-task-definition --task-definition resumexpert-backend-task --query taskDefinition)
          echo $TASK_DEF > task-def.json

          jq --arg IMAGE "${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/${{ secrets.ECR_BACKEND_REPO }}:$IMAGE_TAG" \
          '.containerDefinitions[0].image=$IMAGE
          | del(.taskDefinitionArn,.revision,.status,.requiresAttributes,.compatibilities,.registeredAt,.registeredBy)' \
          task-def.json > new-task-def.json

          aws ecs register-task-definition --cli-input-json file://new-task-def.json

          aws ecs update-service \
            --cluster resumexpert-cluster \
            --service resumexpert-backend-service \
            --force-new-deployment

      # ---------------- FRONTEND ----------------
      - name: Build and push frontend
        run: |
          ECR_URI=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/${{ secrets.ECR_FRONTEND_REPO }}
          docker build -t $ECR_URI:$IMAGE_TAG ./frontend
          docker push $ECR_URI:$IMAGE_TAG

      - name: Update frontend task definition
        run: |
          TASK_DEF=$(aws ecs describe-task-definition --task-definition resumexpert-frontend-task --query taskDefinition)
          echo $TASK_DEF > task-def.json

          jq --arg IMAGE "${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/${{ secrets.ECR_FRONTEND_REPO }}:$IMAGE_TAG" \
          '.containerDefinitions[0].image=$IMAGE
          | del(.taskDefinitionArn,.revision,.status,.requiresAttributes,.compatibilities,.registeredAt,.registeredBy)' \
          task-def.json > new-task-def.json

          aws ecs register-task-definition --cli-input-json file://new-task-def.json

          aws ecs update-service \
            --cluster resumexpert-cluster \
            --service resumexpert-frontend-service \
            --force-new-deployment
